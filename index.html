<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallace POS — Plataforma multiempresa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --acc:#C38D5F; --acc-d:#9c6b42; --acc-l:#E8A87C;
  --ink:#2e2a26; --bg:#faf7f2; --card:#ffffff; --line:#ece5da; --mut:#8a7d70;
  --green:#6BAF92; --red:#c0392b; --blue:#7BA7BC; --purple:#B58DB6;
  --radius:12px; --shadow:0 4px 20px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#ddd3c6;border-radius:4px}
.ic{width:1em;height:1em;display:inline-block;vertical-align:-.125em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
input,select,textarea{width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--ink);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
button{font-family:inherit;cursor:pointer}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:11px;border:none;font-size:14px;font-weight:600;transition:all .15s}
.btn .ic{font-size:16px}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc-d)}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:#fff;color:var(--red);border:1px solid #e8c4bd}
.btn-danger:hover{background:#fdf0ee}
.btn-sm{padding:8px 12px;font-size:13px}
.btn-block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
.label{font-size:12.5px;font-weight:600;color:#6a6058;margin-bottom:6px;display:block}
.field{margin-bottom:14px}
.row{display:flex;gap:12px}
.row>*{flex:1}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(circle at 30% 20%,#2a221e,#1a1614)}
.login-card{background:#fff;border-radius:22px;padding:36px;width:400px;max-width:95vw;box-shadow:0 30px 80px rgba(0,0,0,.4);animation:fade .4s}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.brand{text-align:center;margin-bottom:26px}
.brand .mark{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--acc),var(--acc-d));color:#fff;font-size:28px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.brand h1{font-size:24px;font-weight:800}
.brand h1 span{color:var(--acc)}
.brand p{font-size:12px;color:var(--mut);margin-top:2px}
.login-err{background:#fdf0ee;color:var(--red);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}

/* LAYOUT */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:248px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.side-brand{display:flex;gap:11px;align-items:center;padding:18px;border-bottom:1px solid var(--line)}
.side-logo{width:40px;height:40px;border-radius:11px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;color:#fff;font-weight:800}
.side-logo img{width:100%;height:100%;object-fit:cover}
.side-emp{font-weight:700;font-size:14px;line-height:1.2}
.side-plan{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px;margin-top:2px}
.plan-dot{width:8px;height:8px;border-radius:50%}
.nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;padding:10px 12px;border:none;background:none;border-radius:10px;font-size:14px;color:#6a6058;margin-bottom:2px;font-weight:500;text-align:left}
.nav-item:hover{background:var(--bg)}
.nav-item.on{background:var(--bg);color:var(--acc);font-weight:700}
.side-user{display:flex;align-items:center;gap:10px;padding:14px;border-top:1px solid var(--line)}
.avatar{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.main{flex:1;overflow-y:auto}
.page{padding:26px 30px;max-width:1200px;margin:0 auto}
.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-head h1{font-size:24px;font-weight:800}
.page-head .sub{font-size:13.5px;color:var(--mut);margin-top:2px}

/* CARDS */
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat{background:#fff;border-radius:14px;padding:18px;border:1px solid var(--line)}
.stat .val{font-size:22px;font-weight:800;line-height:1.1}
.stat .lbl{font-size:13px;color:#5a5048;margin-top:4px;font-weight:500}
.stat .sub{font-size:12px;color:var(--mut);margin-top:2px}
.panel{background:#fff;border-radius:14px;padding:18px;border:1px solid var(--line)}
.panel-title{font-weight:700;font-size:15px;margin-bottom:14px}

/* CHIPS / TAGS */
.chip{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:13px;font-weight:600;color:#6a6058}
.chip:hover{background:var(--bg)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.tag{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:capitalize}
.badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}

/* TABLE */
.table-wrap{background:#fff;border-radius:14px;border:1px solid var(--line);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:13px 16px;font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line);background:#fcfaf7;white-space:nowrap}
td{padding:13px 16px;font-size:14px;border-bottom:1px solid var(--bg)}
tr:hover td{background:#fcfaf7}

/* MESAS */
.mesa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.mesa{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;text-align:left;display:flex;flex-direction:column;min-height:110px;transition:.15s}
.mesa:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 6px 18px rgba(195,141,95,.12)}
.mesa.occ{border-color:var(--acc);background:#fdf8f3}
.mesa .name{font-weight:700;font-size:16px}
.mesa .st{font-size:12.5px;display:flex;align-items:center;gap:5px;margin-top:4px;font-weight:600}
.mesa .tot{font-size:20px;font-weight:800;color:var(--acc);margin-top:auto}
.dot{width:7px;height:7px;border-radius:50%}
.mesa.llevar{background:var(--bg);border-style:dashed;align-items:center;justify-content:center;text-align:center}

/* POS */
.pos-layout{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start}
.cat-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.cat-tab{padding:8px 14px;border:1px solid var(--line);border-radius:20px;background:#fff;font-size:13px;font-weight:600;color:#6a6058}
.cat-tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.prod{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:left;display:flex;flex-direction:column;gap:4px;min-height:92px}
.prod:hover{border-color:var(--acc);transform:translateY(-1px)}
.prod .pn{font-weight:600;font-size:14px;line-height:1.25}
.prod .pp{font-weight:800;color:var(--acc);font-size:16px;margin-top:auto}
.prod .ps{font-size:11.5px;color:var(--mut)}
.cuenta{background:#fff;border:1px solid var(--line);border-radius:14px;position:sticky;top:0;display:flex;flex-direction:column;max-height:calc(100vh - 130px)}
.cuenta-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.cuenta-items{flex:1;overflow-y:auto;padding:8px 12px;min-height:120px}
.li{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--bg)}
.li .ln{font-weight:600;font-size:13.5px}
.li .lp{font-size:11.5px;color:var(--mut)}
.stepper{display:flex;align-items:center;gap:4px}
.step{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center}
.step:hover{background:var(--bg)}
.cuenta-foot{padding:16px;border-top:1px solid var(--line)}
.trow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14.5px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(26,22,20,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:18px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.modal.wide{max-width:640px}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:18px}
.modal-body{padding:22px}
.icon-btn{border:none;background:none;color:var(--mut);padding:6px;border-radius:8px;display:flex}
.icon-btn:hover{background:#f0ebe3}

/* TOAST */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;display:none;align-items:center;gap:8px;z-index:200;box-shadow:0 12px 30px rgba(0,0,0,.25)}

/* TICKET */
.ticket{background:#fff;padding:20px 18px;font-family:'Courier New',monospace;font-size:12.5px;color:#000;max-width:320px;margin:0 auto}
.t-line{display:flex;justify-content:space-between;padding:1px 0}
.t-dash{border-top:1px dashed #999;margin:8px 0}
.t-c{text-align:center}
.empty{text-align:center;padding:40px 20px;color:var(--mut);font-size:14px}

@media(max-width:920px){
  .pos-layout{grid-template-columns:1fr}
  .card-grid{grid-template-columns:repeat(2,1fr)}
  .sidebar{position:fixed;left:-248px;z-index:50;transition:.25s;box-shadow:var(--shadow)}
  .sidebar.open{left:0}
  .menu-btn{display:flex!important}
}
.menu-btn{display:none}
@media print{
  body *{visibility:hidden}
  #ticket-print,#ticket-print *{visibility:visible}
  #ticket-print{position:fixed;left:0;top:0;width:80mm}
  .no-print{display:none!important}
}
</style>
</head>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div class="mark">W</div>
      <h1>Wallace<span>POS</span></h1>
      <p>Wallace Company System</p>
    </div>
    <div class="login-err" id="login-err"></div>
    <div class="field">
      <label class="label">Usuario</label>
      <input id="login-user" placeholder="usuario" autocomplete="off">
    </div>
    <div class="field">
      <label class="label">Contraseña</label>
      <input id="login-pass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Ingresar</button>
    <p style="font-size:12px;color:var(--mut);text-align:center;margin-top:16px">Ingresa con tu usuario y contraseña.</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="side-brand">
        <div class="side-logo" id="side-logo">W</div>
        <div>
          <div class="side-emp" id="side-emp">—</div>
          <div class="side-plan" id="side-plan"></div>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="side-user">
        <div class="avatar" id="user-avatar">U</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="user-name">—</div>
          <div style="font-size:11.5px;color:var(--mut)" id="user-role">—</div>
        </div>
        <button class="icon-btn" onclick="doLogout()" title="Salir"><svg class="ic"><use href="#i-out"/></svg></button>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>

<div id="toast"></div>
<div id="modal-root"></div>
