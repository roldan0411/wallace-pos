<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Imperial — Sistema POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C0392B; --red-dark: #922B21; --red-light: #E74C3C;
  --gold: #D4AF37; --gold-light: #F0D060; --gold-dark: #A08020;
  --black: #0A0A0A; --dark: #111111; --dark2: #1A1A1A; --dark3: #222222; --dark4: #2A2A2A;
  --gray: #444444; --gray2: #666666; --gray3: #8a8a8a; --light: #CCCCCC; --white: #F5F0E8;
  --green: #27AE60; --green-l: #2ECC71; --blue: #2980B9; --blue-l: #5DADE2; --orange: #E67E22;
  --shadow: 0 4px 24px rgba(0,0,0,0.6); --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dark2); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

/* ICONS */
.ic { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

/* LOGIN */
#login-screen { min-height: 100vh; background: radial-gradient(ellipse at 30% 50%, #1a0505 0%, #0A0A0A 70%); display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: linear-gradient(145deg, #1a0a0a, #111); border: 1px solid rgba(212,175,55,0.3); border-radius: 16px; padding: 44px 38px; width: 410px; max-width: 95vw; box-shadow: 0 0 80px rgba(192,57,43,0.2), var(--shadow); animation: fade .5s ease; }
@keyframes fade { from { opacity:0; transform: translateY(16px);} to { opacity:1; transform:none;} }
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo .crest { width: 56px; height: 56px; color: var(--gold); margin: 0 auto 10px; display: block; filter: drop-shadow(0 0 10px rgba(212,175,55,0.4)); }
.login-logo h1 { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }
.login-logo p { font-size: 11px; color: var(--gray2); letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; }

.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold-dark); margin-bottom: 7px; font-weight: 500; }
input, select, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); border-radius: var(--radius); padding: 11px 14px; color: var(--white); font-family: 'Inter', sans-serif; font-size: 14px; transition: border-color .2s, box-shadow .2s; outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
select option { background: var(--dark2); }
.pass-wrap { position: relative; }
.pass-wrap input { padding-right: 44px; }
.pass-toggle { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--gray3); cursor: pointer; padding: 6px; display: flex; }
.pass-toggle:hover { color: var(--gold); }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 11px 20px; border-radius: var(--radius); border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; transition: all .18s; text-decoration: none; white-space: nowrap; line-height: 1; }
.btn .ic { font-size: 16px; }
.btn-primary { background: linear-gradient(135deg, var(--red), var(--red-dark)); color: #fff; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 12px rgba(192,57,43,0.35); }
.btn-primary:hover { background: linear-gradient(135deg, var(--red-light), var(--red)); transform: translateY(-1px); }
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--black); font-weight: 600; }
.btn-gold:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--gray3); border: 1px solid var(--dark4); }
.btn-ghost:hover { border-color: var(--gold-dark); color: var(--gold); }
.btn-danger { background: linear-gradient(135deg, #922B21, #7B241C); color: #fff; }
.btn-danger:hover { filter: brightness(1.15); }
.btn-success { background: linear-gradient(135deg, #1E8449, #196F3D); color: #fff; }
.btn-success:hover { filter: brightness(1.1); }
.btn-sm { padding: 7px 12px; font-size: 12px; }
.btn-sm .ic { font-size: 14px; }
.btn-block { width: 100%; }
.btn-icon { padding: 8px; }

/* LAYOUT */
#app { display: none; height: 100vh; }
#sidebar { width: 230px; min-width: 230px; background: linear-gradient(180deg, #0f0505 0%, #0A0A0A 100%); border-right: 1px solid rgba(212,175,55,0.15); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.sidebar-logo { padding: 18px 16px; border-bottom: 1px solid rgba(212,175,55,0.1); text-align: center; }
.sidebar-logo .crest { width: 30px; height: 30px; color: var(--gold); margin: 0 auto 4px; display: block; }
.sidebar-logo h2 { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
.sidebar-logo span { font-size: 9px; color: var(--gray2); letter-spacing: 2px; text-transform: uppercase; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 8px; }
.nav-section { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--gray); padding: 14px 8px 5px; }
.nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 6px; cursor: pointer; transition: all .15s; margin-bottom: 2px; color: var(--gray3); font-size: 13px; border: 1px solid transparent; position: relative; }
.nav-item:hover { background: rgba(212,175,55,0.08); color: var(--white); }
.nav-item.active { background: linear-gradient(135deg, rgba(192,57,43,0.3), rgba(192,57,43,0.08)); color: var(--gold); border-color: rgba(212,175,55,0.2); }
.nav-item .ic { font-size: 18px; }
.nav-badge { position: absolute; right: 10px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.sidebar-user { padding: 12px 14px; border-top: 1px solid rgba(212,175,55,0.1); display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--red), var(--red-dark)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-info { flex: 1; min-width: 0; }
.user-info strong { display: block; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-info small { font-size: 10px; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 1px; }

#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }
#topbar { background: rgba(10,10,10,0.95); border-bottom: 1px solid rgba(212,175,55,0.1); padding: 13px 22px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); flex-shrink: 0; }
.topbar-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 9px; }
.topbar-title .ic { font-size: 20px; color: var(--gold); }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.time-display { font-size: 12px; color: var(--gray3); font-variant-numeric: tabular-nums; }
#menu-toggle { display: none; background: none; border: none; color: var(--gold); cursor: pointer; }
#content { flex: 1; overflow-y: auto; padding: 22px; }

/* CARDS */
.card { background: linear-gradient(145deg, var(--dark2), var(--dark)); border: 1px solid rgba(212,175,55,0.1); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
.card-title { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .ic { font-size: 17px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 22px; }
.stat-card { background: linear-gradient(145deg, var(--dark2), #0f0f0f); border: 1px solid rgba(212,175,55,0.1); border-radius: 10px; padding: 18px; position: relative; overflow: hidden; transition: border-color .2s, transform .2s; }
.stat-card:hover { border-color: rgba(212,175,55,0.3); transform: translateY(-2px); }
.stat-card::before { content: ''; position: absolute; top: 0; right: 0; width: 56px; height: 56px; border-radius: 0 10px 0 56px; opacity: .1; }
.stat-card.red::before { background: var(--red); } .stat-card.gold::before { background: var(--gold); } .stat-card.green::before { background: var(--green); } .stat-card.blue::before { background: var(--blue); }
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gray3); margin-bottom: 7px; }
.stat-value { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
.stat-sub { font-size: 11px; color: var(--gray2); margin-top: 4px; }
.stat-icon { position: absolute; top: 15px; right: 15px; font-size: 20px; opacity: .55; color: var(--gold); }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 10px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold-dark); border-bottom: 1px solid rgba(212,175,55,0.15); font-weight: 600; background: rgba(212,175,55,0.04); }
.data-table td { padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--light); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(212,175,55,0.04); }
.table-wrap { overflow-x: auto; }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: .3px; }
.badge .ic { font-size: 12px; }
.badge-red { background: rgba(192,57,43,0.25); color: #E74C3C; border: 1px solid rgba(192,57,43,0.3); }
.badge-gold { background: rgba(212,175,55,0.15); color: var(--gold); border: 1px solid rgba(212,175,55,0.25); }
.badge-green { background: rgba(39,174,96,0.15); color: #2ECC71; border: 1px solid rgba(39,174,96,0.25); }
.badge-blue { background: rgba(41,128,185,0.15); color: #5DADE2; border: 1px solid rgba(41,128,185,0.25); }
.badge-gray { background: rgba(255,255,255,0.06); color: var(--gray3); border: 1px solid rgba(255,255,255,0.1); }
.badge-orange { background: rgba(230,126,34,0.15); color: #E67E22; border: 1px solid rgba(230,126,34,0.25); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity:0;} to {opacity:1;} }
.modal { background: linear-gradient(145deg, var(--dark2), var(--dark)); border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.8); animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(16px); opacity:0;} to {transform:none; opacity:1;} }
.modal-header { padding: 18px 22px 15px; border-bottom: 1px solid rgba(212,175,55,0.1); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; color: var(--gold); display: flex; align-items: center; gap: 8px; }
.modal-body { padding: 20px 22px; }
.modal-footer { padding: 15px 22px; border-top: 1px solid rgba(212,175,55,0.1); display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }

/* KITCHEN */
.kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 15px; }
.kds-card { background: var(--dark2); border-radius: 10px; border: 2px solid var(--dark4); padding: 15px; transition: border-color .3s; }
.kds-card.t-verde { border-color: rgba(39,174,96,0.6); }
.kds-card.t-amarillo { border-color: rgba(230,126,34,0.7); }
.kds-card.t-rojo { border-color: rgba(192,57,43,0.8); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4);} 50% { box-shadow: 0 0 0 6px rgba(192,57,43,0);} }
.kds-timer { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* GRIDS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* POS */
.pos-layout { display: grid; grid-template-columns: 1fr 370px; gap: 18px; height: calc(100vh - 100px); }
.menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 10px; overflow-y: auto; max-height: 100%; padding-right: 4px; align-content: start; }
.menu-item-card { background: var(--dark2); border: 1px solid rgba(212,175,55,0.1); border-radius: 8px; padding: 13px 10px; cursor: pointer; transition: all .15s; text-align: center; }
.menu-item-card:hover { border-color: var(--gold); background: rgba(212,175,55,0.06); transform: translateY(-2px); }
.menu-item-card .item-ic { font-size: 24px; color: var(--gold); margin-bottom: 5px; }
.menu-item-card .item-name { font-size: 12px; font-weight: 500; color: var(--light); line-height: 1.3; margin-bottom: 4px; }
.menu-item-card .item-price { font-size: 13px; font-weight: 700; color: var(--gold); }
.order-panel { background: var(--dark2); border: 1px solid rgba(212,175,55,0.1); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
.order-head { padding: 12px 14px; border-bottom: 1px solid rgba(212,175,55,0.1); }
.order-items { flex: 1; overflow-y: auto; padding: 10px 12px; }
.order-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.order-summary { padding: 12px; border-top: 1px solid rgba(212,175,55,0.15); background: rgba(0,0,0,0.2); }
.mini-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 7px 10px; color: var(--white); font-size: 12px; outline: none; }
.mini-input:focus { border-color: rgba(212,175,55,0.4); }

/* TABS */
.category-tabs { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
.cat-tab { padding: 6px 13px; border-radius: 20px; border: 1px solid var(--dark4); background: transparent; color: var(--gray3); cursor: pointer; font-size: 12px; transition: all .15s; font-family: 'Inter', sans-serif; width: auto; }
.cat-tab:hover, .cat-tab.active { background: rgba(212,175,55,0.1); border-color: var(--gold-dark); color: var(--gold); }

/* CHART */
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 130px; padding: 10px 0; }
.bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.bar-fill { width: 100%; background: linear-gradient(180deg, var(--gold), var(--red-dark)); border-radius: 4px 4px 0 0; min-height: 4px; transition: height .5s ease; }
.bar-label { font-size: 9px; color: var(--gray3); text-transform: uppercase; letter-spacing: .5px; }
.bar-val { font-size: 9px; color: var(--gold); font-weight: 600; }

/* TOAST */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--dark2); border-left: 3px solid var(--gold); border-radius: 8px; padding: 12px 16px; font-size: 13px; box-shadow: var(--shadow); animation: toastIn .3s ease; max-width: 320px; display: flex; align-items: center; gap: 8px; }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
.toast .ic { font-size: 18px; flex-shrink: 0; }
@keyframes toastIn { from { transform: translateX(100%); opacity:0;} to {transform:none; opacity:1;} }

/* MISC */
.divider { border: none; border-top: 1px solid rgba(212,175,55,0.1); margin: 14px 0; }
.text-gold { color: var(--gold); } .text-red { color: var(--red-light); } .text-green { color: #2ECC71; } .text-gray { color: var(--gray3); }
.text-sm { font-size: 12px; } .text-xs { font-size: 11px; }
.mt-1 { margin-top: 8px; } .mt-2 { margin-top: 16px; } .mb-2 { margin-bottom: 16px; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-2 { gap: 8px; } .font-bold { font-weight: 700; }
.empty-state { text-align: center; padding: 44px 20px; color: var(--gray2); }
.empty-state .ic { font-size: 44px; opacity: .3; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.tipo-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
.tipo-toggle .btn { flex: 1; }

@media print {
  html, body { margin: 0 !important; padding: 0 !important; }
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area { position: absolute; top: 0; left: 0; width: 100%; display: block !important; font-size: 16px; padding: 2mm; margin: 0; }
}
#print-area { display: none; font-family: 'Courier New', monospace; font-size: 15px; color: #000; background: #fff; padding: 10px; width: 300px; }

/* MODO TÁCTIL: botones y elementos más grandes */
body.tactil .btn { padding: 14px 22px; font-size: 15px; }
body.tactil .btn-sm { padding: 11px 16px; font-size: 14px; }
body.tactil .menu-item-card { padding: 18px 14px; }
body.tactil .menu-item-card .item-name { font-size: 14px; }
body.tactil .menu-item-card .item-price { font-size: 15px; }
body.tactil .nav-item { padding: 13px 14px; font-size: 15px; }
body.tactil input, body.tactil select { padding: 14px 16px; font-size: 16px; }
body.tactil .cat-tab { padding: 10px 18px; font-size: 14px; }
body.tactil .order-item-row .btn-icon { width: 32px !important; height: 32px !important; font-size: 18px !important; }

@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .pos-layout { grid-template-columns: 1fr; height: auto; }
  .order-panel { height: auto; }
  #sidebar { position: fixed; left: -240px; z-index: 500; transition: left .3s; box-shadow: var(--shadow); }
  #sidebar.open { left: 0; }
  #menu-toggle { display: flex; }
  #content { padding: 16px; }
  .form-grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="print-area"></div>

<symbol id="i-cart" viewBox="0 0 24 24"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 2-1.58l1.65-7.42H5.12"/></symbol>

<symbol id="i-users" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
<symbol id="i-history" viewBox="0 0 24 24"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></symbol>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img id="login-logo-img" src="" alt="" style="max-height:90px;display:none;margin:0 auto 10px;">
      <svg class="ic crest" id="login-logo-fallback"><use href="#i-crest"/></svg>
      <h1>Portal Imperial</h1>
      <p>Sistema POS</p>
    </div>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="login-user" placeholder="Ingrese su usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="login-pass" placeholder="Ingrese su contraseña" autocomplete="current-password">
        <button class="pass-toggle" onclick="togglePass('login-pass', this)" type="button"><svg class="ic"><use href="#i-eye"/></svg></button>
      </div>
    </div>
    <button class="btn btn-gold btn-block mt-2" onclick="doLogin()" style="font-size:15px;padding:13px;">
      <svg class="ic"><use href="#i-key"/></svg> Iniciar Sesión
    </button>
    <p class="mt-2 text-xs" id="login-error" style="color:var(--red-light);display:none;text-align:center;"></p>
    <div class="mt-2" style="text-align:center;">
      <button class="btn btn-ghost btn-sm" onclick="openModal('modal-recovery')">¿Olvidó su contraseña?</button>
    </div>
    <div style="text-align:center;margin-top:22px;padding-top:14px;border-top:1px solid rgba(212,175,55,0.12);">
      <p style="font-size:9px;letter-spacing:1.5px;color:var(--gray2);text-transform:uppercase;line-height:1.6;">
        Desarrollado por<br>
        <strong style="color:var(--gold-dark);letter-spacing:2px;">Wallace Company System</strong><br>
        <span style="color:var(--gray3);">Ing. Roldán Aldana CCIA</span>
      </p>
    </div>
  </div>

  <!-- PANTALLA DE MARCACIÓN -->
  <div class="login-card" id="asistencia-card" style="display:none;">
    <div class="login-logo">
      <svg class="ic crest"><use href="#i-clock"/></svg>
      <h1>Control de Asistencia</h1>
      <p>Marcar Entrada / Salida</p>
    </div>
    <div class="form-group">
      <label>Cédula</label>
      <input type="text" id="asis-cedula" placeholder="Número de cédula" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>Código</label>
      <input type="password" id="asis-codigo" placeholder="Su código" inputmode="numeric">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-success btn-block" onclick="marcar('entrada')" style="padding:13px;"><svg class="ic"><use href="#i-check"/></svg> Entrada</button>
      <button class="btn btn-danger btn-block" onclick="marcar('salida')" style="padding:13px;"><svg class="ic"><use href="#i-logout"/></svg> Salida</button>
    </div>
    <p class="mt-2 text-xs" id="asis-msg" style="display:none;text-align:center;"></p>
    <div class="mt-2" style="text-align:center;border-top:1px solid rgba(255,255,255,0.06);padding-top:14px;">
      <button class="btn btn-ghost btn-sm" onclick="salirAsistencia()"><svg class="ic"><use href="#i-logout"/></svg> Salir</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:flex;">
  <div id="sidebar">
    <div class="sidebar-logo">
      <img id="sidebar-logo-img" src="" alt="" style="max-height:48px;display:none;margin:0 auto 4px;">
      <svg class="ic crest" id="sidebar-logo-fallback"><use href="#i-crest"/></svg>
      <h2>Portal Imperial</h2>
      <span>POS System</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar-sb">A</div>
      <div class="user-info">
        <strong id="user-name-sb">Admin</strong>
        <small id="user-role-sb">Administrador</small>
      </div>
      <button class="btn btn-icon btn-ghost btn-sm" onclick="doLogout()" title="Cerrar sesión"><svg class="ic"><use href="#i-logout"/></svg></button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button id="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg class="ic" style="font-size:24px"><use href="#i-orders"/></svg></button>
        <div class="topbar-title" id="page-title"><svg class="ic"><use href="#i-dashboard"/></svg> Dashboard</div>
      </div>
      <div class="topbar-right">
        <div class="time-display" id="time-display"></div>
        <button class="btn btn-ghost btn-sm" onclick="toggleTactil()" id="btn-tactil" title="Modo táctil"><svg class="ic"><use href="#i-table"/></svg></button>
        <button class="btn btn-ghost btn-sm" onclick="bloquearPantalla()" title="Bloquear pantalla"><svg class="ic"><use href="#i-lock"/></svg></button>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()"><svg class="ic"><use href="#i-logout"/></svg> Salir</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="modals"></div>

<!-- PANTALLA DE BLOQUEO -->
<div id="lock-screen" style="display:none;position:fixed;inset:0;z-index:2000;background:radial-gradient(ellipse at 50% 40%,#1a0505,#000);align-items:center;justify-content:center;flex-direction:column;">
  <svg class="ic crest" style="width:54px;height:54px;color:var(--gold);margin-bottom:14px;"><use href="#i-lock"/></svg>
  <h2 style="font-family:'Cinzel',serif;color:var(--gold);letter-spacing:2px;margin-bottom:6px;">Pantalla Bloqueada</h2>
  <p id="lock-user" style="color:var(--gray3);font-size:13px;margin-bottom:20px;"></p>
  <input type="password" id="lock-pass" placeholder="Su contraseña" style="width:240px;text-align:center;font-size:18px;letter-spacing:3px;" inputmode="text">
  <p id="lock-error" style="color:var(--red-light);font-size:12px;margin-top:10px;display:none;">Contraseña incorrecta</p>
  <button class="btn btn-gold mt-2" onclick="desbloquearPantalla()" style="width:240px;padding:13px;">Desbloquear</button>
  <button class="btn btn-ghost btn-sm mt-2" onclick="doLogout();ocultarBloqueo()">Cerrar sesión</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="logo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qz-tray@2.2.4/qz-tray.min.js"></script>
<script src="app.js"></script>
</body>
</html>
